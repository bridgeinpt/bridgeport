name: Feature request
description: Suggest a new capability or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing an idea. The most useful requests describe a real use case rather than a specific solution — that lets the maintainers suggest alternatives that might fit better.

  - type: textarea
    id: problem
    attributes:
      label: The problem you're trying to solve
      description: What are you trying to do, and where does BRIDGEPORT fall short today?
      placeholder: |
        I want to roll out a new service version only to one server at a time and watch health metrics between each step.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see?

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What workarounds have you tried?

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, links to similar features in other tools, etc.
