name: Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: '0 3 * * *'  # Nightly at 3 AM UTC

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Hardcoded non-secret values used by integration/system tests. These are
# deterministic test fixtures, not real credentials — real secrets are never
# committed. Kept in one place so they stay consistent across jobs.
env:
  TEST_MASTER_KEY: test-key-for-ci-only-not-real
  TEST_JWT_SECRET: test-jwt-secret-for-ci-only

jobs:
  # ── Tier 1: Unit Tests (fast, every commit) ──────────────
  unit-backend:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      # setup-node@v6 ships npm 10, which silently ignores `.npmrc`'s
      # `min-release-age` key (added in npm 11.10). Install the modern npm
      # globally so subsequent `npm ci` honours the supply-chain cooldown.
      - run: npm install -g npm@latest
      - run: npm ci
      # .npmrc sets ignore-scripts=true (which also gates `npm rebuild`),
      # so force scripts on here so the native binding actually gets built.
      - run: npm rebuild better-sqlite3 --ignore-scripts=false
      - run: npx prisma generate
      - run: npx vitest run --config config/vitest.unit.config.ts

  unit-frontend:
    name: Frontend Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm install -g npm@latest
      - run: cd ui && npm ci
      - run: cd ui && npx vitest run 'src/lib/'

  unit-go:
    name: Go Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
      - run: cd bridgeport-agent && go test ./... -short -count=1
      - run: cd cli && go test ./... -short -count=1

  # ── Tier 2: Integration Tests (every PR) ──────────────
  integration-backend:
    name: Backend Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: unit-backend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm rebuild better-sqlite3 --ignore-scripts=false
      - run: npx prisma generate
      - run: npx vitest run --config config/vitest.config.ts --reporter=github-actions
        env:
          MASTER_KEY: ${{ env.TEST_MASTER_KEY }}
          JWT_SECRET: ${{ env.TEST_JWT_SECRET }}

  integration-frontend:
    name: Frontend Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: unit-frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm install -g npm@latest
      - run: cd ui && npm ci
      - run: cd ui && npx vitest run --coverage --reporter=github-actions
      - uses: codecov/codecov-action@v7
        with:
          files: ui/coverage/lcov.info
          flags: frontend

  # ── Migration Tests (every PR with schema changes) ──────
  migration:
    name: Migration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm rebuild better-sqlite3 --ignore-scripts=false
      - run: npx vitest run --config config/vitest.config.ts tests/migrations/

  # ── Tier 3: System Tests (nightly) ──────────────────────
  system:
    name: System Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm rebuild better-sqlite3 --ignore-scripts=false
      - run: npx prisma generate
      - run: npx vitest run --config config/vitest.unit.config.ts
      - run: npx vitest run --config config/vitest.config.ts
        env:
          MASTER_KEY: ${{ env.TEST_MASTER_KEY }}
          JWT_SECRET: ${{ env.TEST_JWT_SECRET }}
      - run: cd bridgeport-agent && go test ./... -count=1
      - run: cd cli && go test ./... -count=1

  # ── Build Verification ──────────────────────────────────
  build:
    name: Build Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [unit-backend, unit-frontend]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm install -g npm@latest
      - run: npm ci
      # `tsc` and Vite don't load the native better-sqlite3 binding, so no
      # rebuild needed here — saves ~10s per build.
      - run: npx prisma generate
      - run: npm run build
      - run: cd ui && npm ci && npm run build

  # ── TypeScript Check ────────────────────────────────────
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm install -g npm@latest
      - run: npm ci
      # Typecheck doesn't load the native better-sqlite3 binding.
      - run: npx prisma generate
      - run: npx tsc --noEmit
      - run: cd ui && npm ci && npx tsc --noEmit
