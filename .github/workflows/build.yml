name: Build and Push BRIDGEPORT

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      tag:
        description: 'Docker image tag (default: latest)'
        required: false
        default: 'latest'

# Image is published to ghcr.io using the built-in GITHUB_TOKEN so forks and
# external contributors can build without any extra secrets.
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Need full history for git log

      - name: Set versions
        run: |
          # BRIDGEPORT version (always updates with each build)
          if [ -n "${{ github.event.inputs.tag }}" ] && [ "${{ github.event.inputs.tag }}" != "latest" ]; then
            echo "VERSION_TAG=${{ github.event.inputs.tag }}" >> $GITHUB_ENV
          else
            echo "VERSION_TAG=$(date +%Y%m%d%H)-${GITHUB_SHA::7}" >> $GITHUB_ENV
          fi
          echo "APP version (from git): ${VERSION_TAG}"

          # Agent version - derived from last commit that touched agent directory
          # Format: YYYYMMDD-{short-sha} of the last commit to bridgeport-agent/
          AGENT_VER=$(git log -1 --format='%cd-%h' --date=format:'%Y%m%d%H' -- bridgeport-agent/)
          echo "AGENT_VERSION=${AGENT_VER}" >> $GITHUB_ENV
          echo "Agent version (from git): ${AGENT_VER}"

          # CLI version - derived from last commit that touched cli directory
          CLI_VER=$(git log -1 --format='%cd-%h' --date=format:'%Y%m%d%H' -- cli/)
          echo "CLI_VERSION=${CLI_VER}" >> $GITHUB_ENV
          echo "CLI version (from git): ${CLI_VER}"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build BRIDGEPORT Docker image
        run: |
          docker build \
            --build-arg APP_VERSION=${{ env.VERSION_TAG }} \
            --build-arg AGENT_VERSION=${{ env.AGENT_VERSION }} \
            --build-arg CLI_VERSION=${{ env.CLI_VERSION }} \
            -f docker/Dockerfile \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.VERSION_TAG }} \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            .

      - name: Push BRIDGEPORT Docker image
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.VERSION_TAG }}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
