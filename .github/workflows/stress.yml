name: Stress

# Stress tests on every PR are noisy because GitHub-hosted runners have wide
# performance variance (shared kernel, neighbour load, etc). To keep the signal
# without blocking PRs, we run in two modes:
#
#   pull_request      → soft mode. The runner never fails the job; it posts a
#                       sticky PR comment with the latency table and marks any
#                       breached threshold with ⚠️. Engineers see the regression
#                       without the merge button being held hostage.
#
#   workflow_dispatch → hard mode. Manual runs against a known reference branch
#                       are the source of truth for current performance and DO
#                       fail when thresholds are breached.
#
#   schedule          → hard mode. Weekly trend; failures page the team via the
#                       usual GH Actions notifications.

on:
  workflow_dispatch:
    inputs:
      servers:
        description: 'Servers to seed (drives N for ServerMetrics N+1)'
        required: false
        default: '30'
      services_per_server:
        description: 'Services per server'
        required: false
        default: '3'
  pull_request:
    branches: [master]
    paths:
      - 'src/routes/monitoring.ts'
      - 'src/routes/databases.ts'
      - 'src/services/**'
      - 'prisma/schema.prisma'
      - 'tests/stress/**'
      - '.github/workflows/stress.yml'
  schedule:
    - cron: '0 4 * * 1'  # Mondays at 04:00 UTC

permissions:
  contents: read
  pull-requests: write  # for posting/updating the sticky comment

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  MASTER_KEY: ilyS3JROhJmj8QEYHuoZts8aoK2LG9SHl0EgIn0gsVw=
  JWT_SECRET: stress-jwt-secret-not-real
  NODE_ENV: test
  SCHEDULER_ENABLED: 'false'

jobs:
  # The 19 scenarios are split across two parallel shards so end-to-end
  # workflow time is bound by the slower shard (~half the sequential run).
  # Each shard boots its own app + DB and seeds independently — they share
  # nothing at runtime. The aggregator below downloads both reports, merges
  # them, and is the one place that writes the step summary + PR comment.
  stress:
    name: Stress (${{ matrix.shard }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - shard: light
            # Cheap reads + the smaller list endpoints. Roughly half the
            # sequential time of the full suite.
            scenarios: 'auth-me,notifications-unread-count,environments-list,environment-detail,servers-list,services-list,service-detail,container-images-list,monitoring-overview,agents-status,health-status,vars-list,audit-logs,health-logs'
          - shard: heavy
            # Metrics histories + the secrets list (deep nested include).
            # Smaller scenario count but each scenario does more work.
            scenarios: 'metrics-summary,server-metrics-history,service-metrics-history,database-metrics-history,secrets-list'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - name: Run stress tests (${{ matrix.shard }})
        env:
          STRESS_SERVERS: ${{ github.event.inputs.servers || '30' }}
          STRESS_SERVICES_PER_SERVER: ${{ github.event.inputs.services_per_server || '3' }}
          STRESS_METRICS_PER_ENTITY: '12'
          STRESS_SCENARIOS: ${{ matrix.scenarios }}
          # Use the looser ci thresholds (`tests/stress/thresholds.ci.json`)
          # tuned for GitHub-hosted runners. Local dev still uses the tight
          # `thresholds.json` so regressions surface on the first dev-machine
          # run.
          STRESS_CI: 'true'
          # Soft mode on PRs only; manual + scheduled runs enforce thresholds.
          STRESS_SOFT: ${{ github.event_name == 'pull_request' && 'true' || 'false' }}
        run: npm run test:stress

      - name: Upload stress report (${{ matrix.shard }})
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: stress-report-${{ matrix.shard }}
          path: stress-report.json
          retention-days: 30

  aggregate:
    name: Stress (aggregate)
    runs-on: ubuntu-latest
    needs: stress
    if: always()
    timeout-minutes: 3
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Download all shard reports
        uses: actions/download-artifact@v7
        with:
          pattern: stress-report-*
          path: shards

      - name: Merge shard reports
        id: merge
        run: |
          set -euo pipefail
          shopt -s nullglob
          inputs=(shards/stress-report-*/stress-report.json)
          if [ ${#inputs[@]} -eq 0 ]; then
            echo "::warning::No shard reports found — leaving aggregate empty."
            exit 0
          fi
          # Concatenate scenarios from all shards into one report. `passed`
          # and `soft` are reduced (AND for passed, OR for soft — any soft
          # shard means the overall is soft). Metadata (seed, load) is
          # taken from the first shard since they're identical inputs.
          jq -s '
            {
              generatedAt: (map(.generatedAt) | max),
              seed: .[0].seed,
              load: .[0].load,
              # Sort by name so the table order doesn'"'"'t depend on which
              # shard finished first or how the glob expanded.
              scenarios: (map(.scenarios) | add | sort_by(.name)),
              passed: (map(.passed) | all),
              soft: (map(.soft) | any)
            }
          ' "${inputs[@]}" > stress-report.json
          echo "Merged $(jq '.scenarios | length' stress-report.json) scenarios across ${#inputs[@]} shard(s)."

      - name: Upload merged report
        if: hashFiles('stress-report.json') != ''
        uses: actions/upload-artifact@v7
        with:
          name: stress-report
          path: stress-report.json
          retention-days: 30

      - name: Write workflow run summary
        if: hashFiles('stress-report.json') != ''
        run: |
          if [ -f stress-report.json ]; then
            soft=$(jq -r '.soft // false' stress-report.json)
            passed=$(jq -r '.passed' stress-report.json)
            if [ "$passed" = "true" ]; then
              header='## ✅ Stress Test Results'
            elif [ "$soft" = "true" ]; then
              header='## ⚠️ Stress Test Results (soft mode — not failing)'
            else
              header='## ❌ Stress Test Results'
            fi
            {
              echo "$header"
              echo
              echo '| Scenario | p50 | p90 | p99 | RPS | non2xx | Pass |'
              echo '|---|---|---|---|---|---|---|'
              jq -r '.scenarios[] | "| \(.name) | \(.p50)ms | \(.p90)ms | \(.p99)ms | \(.rps | floor) | \(.non2xx) | \(if .passed then "✅" else "⚠️" end) |"' stress-report.json
              echo
              echo '<details><summary>Full report</summary>'
              echo
              echo '```json'
              cat stress-report.json
              echo '```'
              echo
              echo '</details>'
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Fail aggregate when thresholds breached (hard mode only)
        if: hashFiles('stress-report.json') != ''
        run: |
          passed=$(jq -r '.passed' stress-report.json)
          soft=$(jq -r '.soft // false' stress-report.json)
          if [ "$passed" != "true" ] && [ "$soft" != "true" ]; then
            echo "::error::Stress thresholds breached and soft mode is off."
            exit 1
          fi

      - name: Post sticky PR comment (only when thresholds breached)
        if: hashFiles('stress-report.json') != '' && github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            if (!fs.existsSync('stress-report.json')) {
              core.warning('stress-report.json not found — skipping PR comment.');
              return;
            }
            const report = JSON.parse(fs.readFileSync('stress-report.json', 'utf8'));
            const marker = '<!-- stress-report-comment -->';

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            // Find any previous sticky comment from earlier pushes.
            const { data: comments } = await github.rest.issues.listComments({
              owner, repo, issue_number, per_page: 100,
            });
            const existing = comments.find((c) => c.body && c.body.includes(marker));

            // Pass branch: don't post fresh noise. If a previous push left a
            // breach comment, clear it so the PR conversation matches the
            // latest result (stale ⚠ on a now-green run is misleading). Always
            // surface the table in the Actions step summary regardless.
            if (report.passed) {
              if (existing) {
                await github.rest.issues.deleteComment({
                  owner, repo, comment_id: existing.id,
                });
              }
              return;
            }

            const note =
              '\n> ℹ️ GitHub-hosted runners are noisy. To verify a real regression, ' +
              'run the workflow manually (`workflow_dispatch`) or look at the ' +
              'scheduled Monday run on master.\n';

            const rows = report.scenarios.map((s) => {
              const pass = s.passed ? '✅' : '⚠️';
              const reasons = s.failures.length ? ` (${s.failures.join(', ')})` : '';
              return `| \`${s.name}\` | ${s.p50}ms | ${s.p90}ms | **${s.p99}ms** | ${Math.floor(s.rps)} | ${s.non2xx} | ${pass}${reasons} |`;
            }).join('\n');

            const body = [
              marker,
              '### ⚠️ Stress thresholds breached (CI is in soft mode — not blocking)',
              note,
              '| Scenario | p50 | p90 | p99 | RPS | non2xx | Pass |',
              '|---|---|---|---|---|---|---|',
              rows,
              '',
              `**Seed:** ${JSON.stringify(report.seed)}  `,
              `**Load:** ${JSON.stringify(report.load)}  `,
              `**Generated:** ${report.generatedAt}`,
              '',
              '<details><summary>Full JSON report</summary>',
              '',
              '```json',
              JSON.stringify(report, null, 2),
              '```',
              '',
              '</details>',
            ].join('\n');

            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner, repo, issue_number, body,
              });
            }
