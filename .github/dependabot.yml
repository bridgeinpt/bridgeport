version: 2
updates:
  # Backend (Fastify API)
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - backend
    groups:
      minor-and-patch:
        update-types: [minor, patch]

  # Frontend (React UI)
  - package-ecosystem: npm
    directory: /ui
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - frontend
    groups:
      minor-and-patch:
        update-types: [minor, patch]

  # CLI (Go)
  - package-ecosystem: gomod
    directory: /cli
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - cli
    groups:
      minor-and-patch:
        update-types: [minor, patch]

  # Monitoring agent (Go)
  - package-ecosystem: gomod
    directory: /bridgeport-agent
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - agent
    groups:
      minor-and-patch:
        update-types: [minor, patch]

  # GitHub Actions workflows
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - ci
    groups:
      actions:
        patterns: ["*"]

  # Docker base images
  - package-ecosystem: docker
    directory: /docker
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - docker
