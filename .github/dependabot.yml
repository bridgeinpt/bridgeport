version: 2
updates:
  # Backend (Fastify API)
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - backend
    cooldown:
      default-days: 5
      semver-major-days: 7
      semver-minor-days: 5
      semver-patch-days: 3
    groups:
      backend-security:
        applies-to: security-updates
        patterns: ["*"]
      backend-minor-and-patch:
        applies-to: version-updates
        update-types: [minor, patch]

  # Frontend (React UI)
  - package-ecosystem: npm
    directory: /ui
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - frontend
    cooldown:
      default-days: 5
      semver-major-days: 7
      semver-minor-days: 5
      semver-patch-days: 3
    groups:
      frontend-security:
        applies-to: security-updates
        patterns: ["*"]
      frontend-minor-and-patch:
        applies-to: version-updates
        update-types: [minor, patch]

  # CLI (Go)
  - package-ecosystem: gomod
    directory: /cli
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - cli
    cooldown:
      default-days: 3
      semver-major-days: 3
      semver-minor-days: 3
      semver-patch-days: 3
    groups:
      cli-security:
        applies-to: security-updates
        patterns: ["*"]
      cli-minor-and-patch:
        applies-to: version-updates
        update-types: [minor, patch]

  # Monitoring agent (Go)
  - package-ecosystem: gomod
    directory: /bridgeport-agent
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - agent
    cooldown:
      default-days: 3
      semver-major-days: 3
      semver-minor-days: 3
      semver-patch-days: 3
    groups:
      agent-security:
        applies-to: security-updates
        patterns: ["*"]
      agent-minor-and-patch:
        applies-to: version-updates
        update-types: [minor, patch]

  # GitHub Actions workflows
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci
    cooldown:
      default-days: 3
      semver-major-days: 3
      semver-minor-days: 3
      semver-patch-days: 3
    groups:
      actions-security:
        applies-to: security-updates
        patterns: ["*"]
      actions-version:
        applies-to: version-updates
        patterns: ["*"]

  # Docker base images
  - package-ecosystem: docker
    directory: /docker
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - docker
    cooldown:
      default-days: 3
      semver-major-days: 3
      semver-minor-days: 3
      semver-patch-days: 3
    groups:
      docker-security:
        applies-to: security-updates
        patterns: ["*"]
      docker-minor-and-patch:
        applies-to: version-updates
        update-types: [minor, patch]
