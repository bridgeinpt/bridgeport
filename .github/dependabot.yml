version: 2
updates:
  # JS/TS workspace (Fastify backend + React UI).
  #
  # This is a single pnpm workspace: the root `pnpm-lock.yaml` resolves deps for
  # both the root package and `ui/`, so one entry at `directory: /` covers the
  # whole workspace. Dependabot uses `package-ecosystem: npm` for pnpm too — it
  # auto-detects pnpm from the lockfile. The former separate `/` (backend) and
  # `/ui` (frontend) entries are merged here because they can no longer target
  # independent lockfiles; backend + frontend updates now share PRs/labels.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - frontend
      - backend
    cooldown:
      default-days: 5
      semver-major-days: 7
      semver-minor-days: 5
      semver-patch-days: 3
    groups:
      js-security:
        applies-to: security-updates
        patterns: ["*"]
      js-minor-and-patch:
        applies-to: version-updates
        update-types: [minor, patch]

  # CLI (Go)
  - package-ecosystem: gomod
    directory: /cli
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - cli
    cooldown:
      default-days: 3
      semver-major-days: 3
      semver-minor-days: 3
      semver-patch-days: 3
    groups:
      cli-security:
        applies-to: security-updates
        patterns: ["*"]
      cli-minor-and-patch:
        applies-to: version-updates
        update-types: [minor, patch]

  # Go client SDK module
  - package-ecosystem: gomod
    directory: /client
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - client
    cooldown:
      default-days: 3
      semver-major-days: 3
      semver-minor-days: 3
      semver-patch-days: 3
    groups:
      client-security:
        applies-to: security-updates
        patterns: ["*"]
      client-minor-and-patch:
        applies-to: version-updates
        update-types: [minor, patch]

  # Monitoring agent (Go)
  - package-ecosystem: gomod
    directory: /bridgeport-agent
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - agent
    cooldown:
      default-days: 3
      semver-major-days: 3
      semver-minor-days: 3
      semver-patch-days: 3
    groups:
      agent-security:
        applies-to: security-updates
        patterns: ["*"]
      agent-minor-and-patch:
        applies-to: version-updates
        update-types: [minor, patch]

  # GitHub Actions workflows
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci
    cooldown:
      # github-actions does not support the semver-*-days cooldown granularity
      default-days: 3
    groups:
      actions-security:
        applies-to: security-updates
        patterns: ["*"]
      actions-version:
        applies-to: version-updates
        patterns: ["*"]

  # Docker base images
  - package-ecosystem: docker
    directory: /docker
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - docker
    cooldown:
      # docker does not support the semver-*-days cooldown granularity
      default-days: 3
    groups:
      docker-security:
        applies-to: security-updates
        patterns: ["*"]
      docker-minor-and-patch:
        applies-to: version-updates
        update-types: [minor, patch]
