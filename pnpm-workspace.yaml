# Single pnpm workspace covering the backend (root) and the React UI.
# One root pnpm-lock.yaml resolves dependencies for both packages.
packages:
  - '.'
  - 'ui'

# Security overrides — force patched versions of transitive dependencies flagged
# by Dependabot. All live on dev/tooling-only paths (none reach the production
# runtime or the Docker image), but we pin the fixed versions so the alerts
# close and can't silently regress.
#   uuid               GHSA-w5hq-g745-h8pq  (<11.1.1)   via hyperid → autocannon (stress tests)
#   @hono/node-server  GHSA-92pp-h63x-v22m  (<1.19.13)  via @prisma/dev → prisma
#   esbuild            GHSA-g7r4-m6w7-qqqr  (<0.28.1)   via vite + tsx (build/dev tooling)
#
# Deduplication override (not a CVE): @codemirror/state MUST be a singleton —
# CodeMirror uses `instanceof` checks against it, so two copies throw
# "Unrecognized extension value in extension set". Bumping @codemirror/language
# to 6.12.4 (needs state ^6.7.0) alongside consumers still on state 6.6.0 pulls
# two copies, crashing the editor so the config-file view modal never renders.
# Forcing a single ^6.7.0 collapses the tree to one instance.
overrides:
  uuid: '^11.1.1'
  '@hono/node-server': '^1.19.13'
  esbuild: '^0.28.1'
  '@codemirror/state': '^6.7.0'

# Supply-chain hardening (replaces the old .npmrc `ignore-scripts=true`).
#
# pnpm refuses to run package install/build lifecycle scripts by default. The
# `allowBuilds` map is the pnpm 11 successor to v10's `onlyBuiltDependencies`:
# each package must be explicitly allowed (`true`) or denied (`false`) to run
# its build scripts; anything not listed stays blocked. We also set
# `strictDepBuilds: true` (it is OFF by default in pnpm 11) so an unlisted
# dependency that wants to build fails the install loudly rather than silently
# skipping its native binding — this is the "harder to regress" ratchet.
#
#   better-sqlite3                        → compile native binding
#   esbuild                               → links its platform binary
#   @prisma/engines / prisma              → fetch + place the query engine
#   protobufjs                            → build-time codegen (dep of dockerode)
#   msw                                   → service-worker asset (dev/test only)
#
# ssh2 / cpu-features are explicitly DENIED (`false`): their optional native
# crypto addon does not compile against Node 26's V8 (`v8::Context::GetIsolate`
# was removed), so the build only ever produced a fatal-looking compile error
# before ssh2 fell back to its pure-JS crypto anyway. We skip the build
# entirely — identical runtime behavior, no scary error in the logs. A `false`
# is a real decision, so `strictDepBuilds` stays satisfied (it only fails the
# install for *unlisted* build-wanting deps).
allowBuilds:
  better-sqlite3: true
  '@prisma/engines': true
  prisma: true
  ssh2: false
  cpu-features: false
  esbuild: true
  protobufjs: true
  msw: true

# Supply-chain cooldown: don't pull a freshly published version until it has
# been on the registry for at least this many MINUTES. 1440 minutes = 1 day,
# matching the old npm `min-release-age=1` (npm measured this in days). This is
# also pnpm 11's default, but we pin it explicitly so the intent is documented.
minimumReleaseAge: 1440

# Fail `pnpm install` if any dependency wanting to run build scripts is not in
# the allowBuilds map above. OFF by default in pnpm 11; we opt in so an
# unlisted native dep is caught loudly in CI instead of silently shipping
# without its binding.
strictDepBuilds: true
