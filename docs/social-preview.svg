<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640">
  <defs>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.04"/>
    </pattern>
    <radialGradient id="glow" cx="20%" cy="38%" r="60%">
      <stop offset="0" stop-color="#cc0000" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#cc0000" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="640" fill="#0a0e14"/>
  <rect width="1280" height="640" fill="url(#grid)"/>
  <rect width="1280" height="640" fill="url(#glow)"/>
  <!-- burgundy accent edge -->
  <rect x="0" y="0" width="10" height="640" fill="#cc0000"/>

  <!-- ===== lockup: mark + wordmark ===== -->
  <g transform="translate(120 92) scale(2.25)" fill="#cc0000">
    <rect x="30.5" y="9" width="3" height="20" rx="1.5"/>
    <rect x="20" y="27" width="24" height="2.6" rx="1.3"/>
    <rect x="20" y="38.4" width="24" height="2.6" rx="1.3"/>
    <rect x="21" y="29.6" width="2" height="8.8"/><rect x="25" y="29.6" width="2" height="8.8"/><rect x="29" y="29.6" width="2" height="8.8"/><rect x="33" y="29.6" width="2" height="8.8"/><rect x="37" y="29.6" width="2" height="8.8"/><rect x="41" y="29.6" width="2" height="8.8"/>
    <polygon points="13,16 19,16 13,52 7,52"/><polygon points="45,16 51,16 57,52 51,52"/>
    <rect x="4" y="52" width="14" height="4" rx="1.5"/><rect x="46" y="52" width="14" height="4" rx="1.5"/>
    <rect x="11" y="9" width="42" height="7" rx="2"/><rect x="26" y="16" width="12" height="6" rx="1.5"/>
  </g>
  <text x="288" y="205" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-weight="700" font-size="96" letter-spacing="1" fill="#F1F5F9">BRIDGEPORT</text>

  <!-- tagline -->
  <text x="126" y="312" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-weight="700" font-size="27" letter-spacing="5" fill="#cc0000">DOCK. RUN. SHIP. REPEAT.</text>

  <!-- description -->
  <text x="125" y="404" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-weight="500" font-size="38" fill="#C3CCD6">Self-hosted Docker orchestration &amp; monitoring</text>
  <text x="125" y="456" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-weight="500" font-size="38" fill="#C3CCD6">across all your servers — <tspan fill="#F1F5F9" font-weight="700">without Kubernetes</tspan>.</text>

  <!-- footer -->
  <rect x="126" y="520" width="300" height="4" rx="2" fill="#cc0000"/>
  <text x="126" y="566" font-family="Menlo, Consolas, monospace" font-size="25" fill="#7A838F">github.com/bridgeinpt/bridgeport</text>
  <text x="1154" y="566" text-anchor="end" font-family="Menlo, Consolas, monospace" font-size="25" fill="#7A838F">Apache-2.0</text>
</svg>
