coverage:
  status:
    project: off  # No global gate
    patch:
      default:
        target: 90%  # 90% on changed files
        threshold: 2%
  flags:
    backend:
      paths:
        - src/
    frontend:
      paths:
        - ui/src/

ignore:
  - prisma/
  - test/
  - "**/*.d.ts"
  - "**/types.ts"
