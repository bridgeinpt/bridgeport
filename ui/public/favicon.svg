<svg width="160" height="160" viewBox="32 16 160 160" xmlns="http://www.w3.org/2000/svg">

  <!-- Stylized crane: vertical mast, horizontal arm -->
  <rect x="50" y="50" width="20" height="100" fill="#CC0000"/> <!-- Mast -->
  <rect x="70" y="50" width="100" height="20" fill="#CC0000"/> <!-- Arm -->
  <line x1="170" y1="60" x2="170" y2="120" stroke="#CC0000" stroke-width="10"/> <!-- Cable -->

  <!-- Stylized anchor integrated: at the end of the cable -->
  <path d="M160 120 L170 150 L180 120" fill="#CC0000"/> <!-- Anchor flukes -->
  <circle cx="170" cy="110" r="10" fill="none" stroke="#CC0000" stroke-width="5"/> <!-- Ring -->
  <rect x="165" y="120" width="10" height="20" fill="#CC0000"/> <!-- Shank -->

</svg>