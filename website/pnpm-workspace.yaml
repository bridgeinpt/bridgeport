# Standalone workspace for the documentation site.
#
# The docs site is intentionally NOT part of the root app workspace: keeping its
# frontend toolchain (Astro, sharp, etc.) out of the app's pnpm-lock.yaml means the
# production Docker image's `--prod --filter=bridgeport` install is unaffected. CI
# and Cloudflare Pages install/build from this directory.
packages:
  - '.'

# Security overrides — force patched versions of transitive dependencies flagged
# by Dependabot. These live on the docs-site build path only (Astro/Starlight
# tooling); they never reach the app runtime or the Docker image. We pin the
# fixed versions so the alerts close and can't silently regress.
#   form-data  GHSA-hmw2-7cc7-3qxx / CVE-2026-12143  (<4.0.6)  via httpsnippet → starlight-openapi
overrides:
  form-data: '^4.0.6'

# Build scripts the Astro toolchain needs. Both install prebuilt binaries (no local
# compilation): sharp links libvips for image optimization; esbuild links its
# platform binary. Anything else stays blocked (strictDepBuilds below).
allowBuilds:
  sharp: true
  esbuild: true

# Mirror the app workspace's supply-chain posture.
minimumReleaseAge: 1440
strictDepBuilds: true
