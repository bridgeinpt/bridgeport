# BridgePort Docker Compose Configuration
#
# Host Server Management:
# To manage Docker containers on the host machine (where BridgePort runs),
# the host must have SSH enabled and allow connections from the Docker network.
# BridgePort auto-detects the Docker gateway IP (172.17.0.1 or host.docker.internal)
# and can SSH to the host like any other server.
#
# Requirements for host management:
# 1. SSH server running on host (sshd)
# 2. Firewall allows connections from 172.17.0.0/16
# 3. SSH key authorized in host's ~/.ssh/authorized_keys
#
# Alternative: For monitoring-only, extract the agent from the container:
#   docker cp bridgeport:/app/agent/bridgeport-agent ./bridgeport-agent

services:
  bridgeport:
    image: registry.digitalocean.com/bios-registry/bridgeport:latest
    container_name: bridgeport
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/data/bridgeport.db
      - SSH_KEY_PATH=/app/.ssh/bios-infra
      - SSH_USER=root
      - UPLOAD_DIR=/data/uploads
    user: "1000:1000"  # Run as node user (non-root)
    volumes:
      - ./data:/data
      - /root/.ssh/bios-infra:/app/.ssh/bios-infra:ro
      # SSH keys can also be configured via the UI (Settings > SSH Configuration)
      # The UI-configured key is encrypted and stored in the database
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - caddy

  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./certs:/certs:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - bridgeport
    networks:
      - caddy

volumes:
  caddy_data:
  caddy_config:

networks:
  caddy:
    driver: bridge
