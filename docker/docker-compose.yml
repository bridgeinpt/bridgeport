services:
  bridgeport:
    image: registry.digitalocean.com/bios-registry/bridgeport:latest
    container_name: bridgeport
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/data/bridgeport.db
      - SSH_KEY_PATH=/app/.ssh/bios-infra
      - SSH_USER=root
      - UPLOAD_DIR=/data/uploads
    user: "1000:1000"  # Run as node user (non-root)
    volumes:
      - ./data:/data
      - /root/.ssh/bios-infra:/app/.ssh/bios-infra:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - caddy

  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./certs:/certs:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - bridgeport
    networks:
      - caddy

volumes:
  caddy_data:
  caddy_config:

networks:
  caddy:
    driver: bridge
