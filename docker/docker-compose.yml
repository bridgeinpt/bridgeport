# BridgePort Docker Compose Configuration
#
# Host Server Management:
# BridgePort can manage Docker containers on the host machine in two ways:
#
# Option 1: Docker Socket (Recommended for host management)
# - Mount the Docker socket to allow direct Docker API access
# - No SSH setup required, simpler configuration
# - Uncomment the socket volume mount below
#
# Option 2: SSH (For remote servers or when socket not available)
# - SSH server running on host (sshd)
# - Firewall allows connections from 172.17.0.0/16
# - SSH key authorized in host's ~/.ssh/authorized_keys
#
# Alternative: For monitoring-only, extract the agent from the container:
#   docker cp bridgeport:/app/agent/bridgeport-agent ./bridgeport-agent

services:
  bridgeport:
    image: registry.digitalocean.com/bios-registry/bridgeport:latest
    container_name: bridgeport
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/data/bridgeport.db
      - UPLOAD_DIR=/data/uploads
    user: "1000:1000"  # Run as node user (non-root)
    volumes:
      - ./data:/data
      # Docker socket mount (optional - for host container management)
      # Uncomment to enable socket mode for managing containers on this host.
      # Security note: This gives BridgePort full access to the Docker daemon.
      # - /var/run/docker.sock:/var/run/docker.sock
      #
      # Custom plugins (optional - mount to add/override plugin JSON files)
      # - ./plugins:/app/plugins
      #
      # SSH keys are configured via the UI per environment (Settings > SSH)
      # Each environment has its own SSH key for security isolation
      # Keys are encrypted and stored in the BridgePort database
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - caddy

  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./certs:/certs:ro
      - caddy_data:/data
      - caddy_config:/config
    healthcheck:
      # Requires health endpoint in Caddyfile: :80 { respond /health 200 }
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      - bridgeport
    networks:
      - caddy

volumes:
  caddy_data:
  caddy_config:

networks:
  caddy:
    driver: bridge
